name: Release

on:
  release:
    types: [published]

jobs:
  release:
    runs-on: ubuntu-latest
    environment: MVN

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v4
      with:
        java-version: '11'
        distribution: 'temurin'
        cache: 'maven'

    - name: Configure Maven settings
      run: |
        mkdir -p ~/.m2
        cat > ~/.m2/settings.xml << 'EOF'
        <settings>
          <servers>
            <server>
              <id>cytoscape_releases</id>
              <username>${env.REPO_USER}</username>
              <password>${env.REPO_PWD}</password>
            </server>
          </servers>
          <mirrors>
            <mirror>
              <id>maven-default-http-blocker</id>
              <mirrorOf>dummy</mirrorOf>
              <name>Dummy mirror</name>
              <url>http://0.0.0.0/</url>
            </mirror>
          </mirrors>
        </settings>
        EOF

    - name: Extract and validate version from tag
      id: version
      run: |
        TAG="${{ github.event.release.tag_name }}"
        VERSION="${TAG#v}"
        if ! echo "$VERSION" | grep -qE '^[0-9]+\.[0-9]+\.[0-9]+$'; then
          echo "Error: '$VERSION' is not valid semver (expected X.Y.Z)"
          exit 1
        fi
        echo "version=$VERSION" >> $GITHUB_OUTPUT

    - name: Set version in pom.xml
      run: mvn versions:set -DnewVersion=${{ steps.version.outputs.version }} -DgenerateBackupPoms=false

    - name: Build release JAR
      run: xvfb-run mvn package -DskipTests

    - name: Upload JAR to release
      run: |
        gh release upload "${{ github.event.release.tag_name }}" \
          "target/cy-ndex-2-${{ steps.version.outputs.version }}.jar" \
          --clobber
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Deploy to Maven repository
      run: mvn deploy -DskipTests
      env:
        REPO_USER: ${{ secrets.REPO_USER }}
        REPO_PWD: ${{ secrets.REPO_PWD }}
